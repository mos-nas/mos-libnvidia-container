name: libnvidia-container arm

on:
  # Set schedule to run every 24 hours
  #schedule:
  #  - cron: '* */24 * * *'

  # Allow to trigger action manually
  workflow_dispatch:

jobs:
  check_and_release:
    runs-on: ubuntu-24.04-arm

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 1

    - name: Check versions
      run: |
        # Grab latest release from official repostiory and latest release version from this repostiory
        LATEST_LIBNVIDIA="$(curl -u ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} -s https://api.github.com/repos/NVIDIA/libnvidia-container/tags | jq -r '.[] | select(.name | test("-(rc|beta|alpha)"; "i") | not) | .name' | sort -V | tail -1 | sed 's/^v//')"
        CURRENT_LIBNVIDIA="$(curl -u ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} -s https://api.github.com/repos/${{ github.repository_owner }}/mos-libnvidia-container/releases/latest | jq -r '.tag_name' | sed 's/^v//')"

        echo "CREATE_RELEASE=true" >> $GITHUB_ENV
        echo "LIBNVIDIA_VERSION=${LATEST_LIBNVIDIA}" >> $GITHUB_ENV

    - name: Log in to GitHub Container Registry
      if: env.CREATE_RELEASE == 'true'
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Run Docker container and build libnvidia-container
      if: env.CREATE_RELEASE == 'true'
      run: |
        docker run --rm \
          -v ${{ github.workspace }}/output:/tmp \
          -e LIBNVIDIA_VERSION=${LIBNVIDIA_VERSION} \
          ghcr.io/${{ github.repository }}/mos-libnvidia-container:buster_arm

    - name: Create and Upload Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.LIBNVIDIA_VERSION }}
        name: "libnvidia-container ${{ env.LIBNVIDIA_VERSION }}"
        body: |
          libnvidia-container ${{ env.LIBNVIDIA_VERSION }} for MOS
        files: |
          ${{ github.workspace }}/output/libnvidia-container_${{ env.LIBNVIDIA_VERSION }}-1+mos_arm64.deb*
        overwrite_files: true
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
